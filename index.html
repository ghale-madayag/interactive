<style>

  }

    background:linear-gradient(135deg,var(--bg1),var(--bg2)) fixed;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:820px;margin:0 auto;padding:18px 16px 60px}
  .topbar{display:flex;align-items:center;gap:12px;color:#fff;margin:6px 2px 18px}
  .topbar .logo{font-size:34px;line-height:1}
  .topbar h1{font-size:20px;margin:0;font-weight:800;letter-spacing:.2px}
  .topbar p{margin:2px 0 0;font-size:12.5px;opacity:.85}
  .btn{
    cursor:pointer;border:none;border-radius:16px;font-weight:700;font-size:16px;
    padding:14px 18px;transition:transform .06s ease, box-shadow .15s ease, background .15s;
    background:var(--accent);color:#3b2600;box-shadow:0 4px 0 #b8791f;
  }
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #b8791f}
  .btn.secondary{background:#fff;color:var(--ink);box-shadow:0 4px 0 #cbd5e1}
  .btn.secondary:active{box-shadow:0 1px 0 #cbd5e1}
  .btn.ghost{background:rgba(255,255,255,.16);color:#fff;box-shadow:none;font-weight:600}
  .btn.small{font-size:14px;padding:9px 14px;border-radius:12px}
  .btn[disabled]{opacity:.5;cursor:not-allowed}
  .card{background:var(--card);border-radius:22px;padding:22px;box-shadow:0 12px 30px rgba(0,0,0,.18);margin-bottom:16px}
  .grid{display:grid;grid-template-columns:1fr;gap:14px}
  @media(min-width:620px){.grid{grid-template-columns:1fr 1fr 1fr}}

  .lesson-card{cursor:pointer;border-radius:20px;padding:18px;color:#fff;position:relative;overflow:hidden;border:none;text-align:left;transition:transform .08s}
  .lesson-card:active{transform:scale(.98)}
  .lesson-card .num{font-size:13px;opacity:.9;font-weight:700}
  .lesson-card h3{margin:6px 0 6px;font-size:18px;line-height:1.25}
  .lesson-card .meta{font-size:12.5px;opacity:.92}
  .lesson-card .emoji{position:absolute;right:12px;top:10px;font-size:40px;opacity:.35}
  .prog{height:8px;border-radius:99px;background:rgba(255,255,255,.35);margin-top:12px;overflow:hidden}
  .prog > i{display:block;height:100%;background:#fff;border-radius:99px;width:0}

  .pill{display:inline-flex;align-items:center;gap:6px;background:var(--soft);color:#4338ca;border-radius:99px;padding:5px 12px;font-size:12.5px;font-weight:700}
  .crumbs{color:#e9e7ff;font-size:13px;margin:0 2px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .crumbs a{color:#fff;cursor:pointer;text-decoration:underline;font-weight:600}

  h2.title{font-size:22px;margin:2px 0 4px}
  .sub{color:var(--muted);font-size:14px;margin:0 0 14px}

  .menu-row{display:flex;gap:12px;flex-wrap:wrap}
  .act-item{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--soft);border:2px solid transparent;border-radius:16px;padding:14px;cursor:pointer;transition:.12s;margin-bottom:10px}
  .act-item:hover{border-color:var(--ring)}
  .act-item .ic{font-size:26px}
  .act-item .txt{flex:1}
  .act-item .txt b{display:block;font-size:15.5px}
  .act-item .txt span{font-size:12.5px;color:var(--muted)}
  .act-item .tag{font-size:11px;font-weight:800;padding:4px 9px;border-radius:99px}
  .tag.auto{background:#dcfce7;color:#166534}
  .tag.self{background:#fef9c3;color:#854d0e}
  .tag.read{background:#e0f2fe;color:#075985}
  .tick{color:var(--good);font-weight:800;font-size:18px}

  /* passages */
  .passage{background:var(--soft2);border-radius:16px;padding:18px;line-height:1.7;font-size:16px}
  .passage .ptext{white-space:pre-line}
  .passage.poem{white-space:pre-line;font-style:italic}
  .passage h4{margin:0 0 2px;font-size:19px;text-align:center;font-style:normal}
  .passage .by{text-align:center;color:var(--muted);font-size:13px;margin-bottom:14px;font-style:normal}
  .ingredients{background:#fff;border-radius:12px;padding:12px 16px;margin-top:12px}
  .ingredients li{margin:3px 0}

  .qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .qcount{font-size:13px;color:var(--muted);font-weight:700}
  .qbar{height:8px;background:#eee;border-radius:99px;overflow:hidden;margin-bottom:18px}

  .qtext{font-size:18px;font-weight:700;line-height:1.4;margin:2px 0 16px}
  .qtext .idx{color:var(--accent2)}
  .opt{display:block;width:100%;text-align:left;background:#fff;border:2px solid #e5e7eb;border-radius:14px;padding:14px 16px;margin-bottom:10px;font-size:16px;cursor:pointer;transition:.1s}
  .opt:hover{border-color:var(--ring);background:var(--soft)}
  .opt.correct{border-color:var(--good);background:#f0fdf4}
  .opt.wrong{border-color:var(--bad);background:#fef2f2}
  .opt .lead{font-weight:800;color:var(--muted);margin-right:8px}
  .opt.correct .lead{color:var(--good)}
  .opt.wrong .lead{color:var(--bad)}
  .fb{border-radius:12px;padding:12px 14px;font-size:14.5px;margin:4px 0 14px;font-weight:600}
  .fb.ok{background:#f0fdf4;color:#166534}
  .fb.no{background:#fef2f2;color:#991b1b}
  .navq{display:flex;justify-content:space-between;gap:10px;margin-top:6px}

  /* matching */
  .match-wrap{display:flex;gap:12px}
  .match-col{flex:1}
  .match-col h5{margin:0 0 8px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .chip{display:block;width:100%;text-align:left;border:2px solid #e5e7eb;background:#fff;border-radius:12px;padding:11px 12px;margin-bottom:9px;cursor:pointer;font-size:14.5px;transition:.1s}
  .chip:hover{border-color:var(--ring)}
  .chip.sel{border-color:var(--accent2);background:#fdf2f8}
  .chip.done{border-color:var(--good);background:#f0fdf4;cursor:default;opacity:.85}
  .chip .badge{float:right;font-weight:800;color:var(--accent2)}
  .chip.done .badge{color:var(--good)}

  .seq-item{display:flex;align-items:center;gap:10px;background:#fff;border:2px solid #e5e7eb;border-radius:12px;padding:10px 12px;margin-bottom:8px}
  .seq-item .pos{font-weight:800;background:var(--soft);color:#4338ca;border-radius:9px;min-width:30px;height:30px;display:flex;align-items:center;justify-content:center}
  .seq-item .body{flex:1;font-size:14px;line-height:1.35}
  .seq-item .arrows{display:flex;flex-direction:column;gap:3px}
  .seq-item .arrows button{border:none;background:var(--soft);border-radius:7px;width:30px;height:22px;cursor:pointer;font-size:12px;font-weight:800;color:#4338ca}
  .seq-item.ok{border-color:var(--good);background:#f0fdf4}
  .seq-item.bad{border-color:var(--bad);background:#fef2f2}

  /* fillblank */
  .fbq{font-size:16px;line-height:2.1;margin-bottom:14px}
  .fbq select{font-size:15px;padding:6px 8px;border-radius:10px;border:2px solid var(--ring);background:#fff;margin:0 4px}
  .fbq select.ok{border-color:var(--good);background:#f0fdf4}
  .fbq select.no{border-color:var(--bad);background:#fef2f2}
  .wordbox{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .wordbox span{background:var(--soft);color:#4338ca;border-radius:99px;padding:6px 12px;font-size:13px;font-weight:700}

  /* truefalse */
  .tf-row{background:#fff;border:2px solid #e5e7eb;border-radius:14px;padding:12px 14px;margin-bottom:10px}
  .tf-row .st{font-size:15.5px;margin-bottom:9px;line-height:1.4}
  .tf-row .opts{display:flex;gap:8px}
  .tf-row .opts button{flex:1;border:2px solid #e5e7eb;background:#fff;border-radius:10px;padding:9px;font-weight:700;cursor:pointer;font-size:14px}
  .tf-row .opts button.pick{border-color:var(--accent2);background:#fdf2f8}
  .tf-row.ok{border-color:var(--good);background:#f0fdf4}
  .tf-row.bad{border-color:var(--bad);background:#fef2f2}

  /* shortcheck */
  .sc-q{font-size:16px;font-weight:700;margin:14px 0 8px;line-height:1.4}
  .sc-q .n{color:var(--accent2)}
  textarea{width:100%;border:2px solid #e5e7eb;border-radius:12px;padding:12px;font-size:15px;font-family:inherit;resize:vertical;min-height:70px}
  textarea:focus{outline:none;border-color:var(--ring)}
  .model{background:#ecfeff;border:1px dashed #06b6d4;border-radius:12px;padding:12px 14px;margin-top:8px;font-size:14.5px;line-height:1.5}
  .model b{color:#0e7490}

  /* results */
  .result{text-align:center;padding:8px 4px}
  .result .big{font-size:64px}
  .result .score{font-size:44px;font-weight:900;margin:6px 0}
  .result .score small{font-size:20px;color:var(--muted)}
  .result .msg{font-size:16px;color:var(--muted);margin-bottom:18px}
  .stars{font-size:30px;letter-spacing:6px;margin:4px 0 8px}

  .note{background:#fffbeb;border:1px solid #fcd34d;border-radius:12px;padding:10px 14px;font-size:13px;color:#92400e;margin-top:12px}
  .center{text-align:center}
  .mt{margin-top:14px}
  a.origlink{display:inline-block;margin-top:12px;font-size:13px;color:#4338ca;font-weight:700}
  .hide{display:none}
</style>
</head>

Nang magawa kong iatras ang aking mga paa, tila lalong bumilis ang mga paghakbang ni Soleng. Sa isang maling tapak ng aking paa ay nadulas ako at napahiga. Tumama ang aking siko at ito ay nagdugo. Napaiyak ako sa hapdi, ngunit higit lalo na sa takot. Abot-kamay na ako ni Soleng nang magawa kong sumigaw. Ubod ng lakas.

Biglang nagsulputan ang mga lokal mula sa kung saan-saang panig. Nagpaulan sila ng mga bato kay Soleng at ang babaeng “aswang” ay walang nagawa kundi proteksyunan ang kaniyang sarili gamit ang kaniyang mga bisig. Humihiyaw siya sa sakit sa tuwing tatamaan siya ng malalaking bato. Napaluhod siya sa lupa. Gumaganti na rin si Soleng sa mga lokal. Ang mga sumaklolo sa akin ay unti-unting nabawasan hanggang sa tuluyan nang maglaho. Kami na lamang ni Soleng ang naiwan.

Ang babaeng “aswang” naman ay may matinding lungkot. Hindi na nanlilisik ang kaniyang mata. Wala na rin ang mahaba at matatalim niyang kuko, maging ang kaniyang mga pangil. Isa na lamang siya ngayong pangkaraniwang babaeng tinakasan ng bait. Tinitigan niya ako at kitang-kita ko kung paanong ang mga mata niya ay lumuha.

Nang mula sa kung saan ay dinampot ako ng aking lolo. Nagagalit siya sa akin, matigas daw ang ulo ko. Sinabi na raw na huwag kong pupuntahan ang bahay ng babaeng “aswang.” Bitbit na niya ako palayo kaya naman hindi ko na nakita ang pagtalikod ni Soleng. Iyon na pala ang huling beses na makikita siya sa San Andres.

Ngayong binabalikan ko ang kwentong ito ay hindi ko maiwasan na matakot at mapahiya sa aking sarili. Si Soleng… ano ba ang naging kasalanan niya sa akin at sa mga lokal upang danasin niya ang ganoong kalupitan? Isa lamang siyang babaeng naging biktima ng pagkakataon at ng kaniyang sakit sa pag-iisip. Pang-unawa ang kaniyang kailangan, hindi panlilibak at kung ano-anong mga haka-haka. Kung tutuusin, mas nakapangingilabot pa ako kaysa kay Soleng sampu ng lahat ng mga nanakit sa kaniya. Kung tutuusin, mas masahol pa kami sa mga aswang.`

            heading:"Digital Citizenship at Netiquette", by:"Aralin 1 · EPP-ICT",
            body:
`Ang digital citizenship ay tumutukoy sa kakayahan ng isang indibidwal na gumamit ng computer at iba pang digital device sa ligtas at responsableng pamamaraan. Digital citizen ang tawag sa taong nakapagsasagawa ng responsableng paggamit ng makabagong teknolohiya.

Ang Netiquette ay salitang nabuo sa pagsasama ng mga salitang internet at etiquette. Ito ay tumutukoy sa mga alituntunin, gabay o pamantayan ng katanggap-tanggap na pag-uugali habang gumagamit ng internet.

Mga Panuntunan ng Netiquette:
1. Makisalamuha nang tama at kumilos nang angkop sa lipunan.
2. Manatiling laging ligtas — tiyaking ligtas ang website (may https).
3. Panatilihin ang integridad at respeto sa kapwa.
4. Isaisip ang pakikisalamuhang nakatutulong.
5. Pahalagahan ang oras.
6. Umaayon sa tunay na buhay at panatilihin ang tunay na dahilan ng pakikipag-ugnayan.
7. Gamitin ang mga emoticon sa tamang pamamaraan.
8. Isaisip ang tamang baybay, sukat, kulay at bantas ng mga salita.
9. Manatili sa makabuluhang paksa lamang at gamitin nang wasto ang pagkakataon.
10. Alamin ang magiging epekto ng pakikipag-ugnayan.
11. Isaisip ang iyong digital footprint (bakas na naiiwan sa tuwing gumagamit ng internet).

Mahalaga ang netiquette upang mapanatili ang maayos at magalang na komunikasyon sa digital space at maiwasan ang di-pagkakaunawaan. Ang cybercrime naman ay ang pagsasagawa ng mga bagay na ipinagbabawal o ilegal gamit ang computer at internet.`

`Ang web browser ay isang software na ginagamit upang mag-browse o mag-navigate sa internet. Ito ang nagkokonekta sa mga tao sa iba't ibang website mula sa World Wide Web (www).

Ang World Wide Web ay bahagi ng internet na ginagamit upang makapag-access ng impormasyon tulad ng teksto, larawan, at video. Ang website ay koleksyon ng magkakaugnay na webpage sa ilalim ng iisang domain; ang webpage naman ay isang partikular na pahina sa loob ng website.

Iba't ibang Uri ng Web Browser:
1. Google Chrome — libre / open source, gawa ng Google (2008).
2. Mozilla Firefox — libre at open source, gawa ng Mozilla Foundation; kilala sa bilis at seguridad.
3. Opera Web — mabilis, may built-in ad blocker at VPN (1995, Opera Software).
4. Safari — itinuturing na pinakamabilis; gawa ng Apple.
5. Internet Explorer — gawa ng Microsoft; nagretiro noong Hunyo 15, 2022.
6. Microsoft Edge — bagong browser ng Microsoft (2015).
7. Samsung Internet — gawa ng Samsung Electronics (2012).

Mga Bahagi ng Web Browser: Menu Bar, Browser Tool Bar (Address Bar, Back button, Forward button, Extension, Refresh button, Bookmark button, Menu button), at Main Viewing Panel.`

`Ang search engine ay isang programa na tumutulong sa paghahanap ng impormasyon mula sa malawak na database na konektado sa internet. Gumagamit ito ng keyword. Iba ang web browser sa search engine — kailangan munang gumamit ng web browser bago maka-access ng search engine. Mga halimbawa: Google, Bing, at Yahoo.

Apat na pangunahing bahagi ng search engine: (1) Search Interface, (2) Web Crawler, (3) Indexer, at (4) Database.

Ang email (electronic mail) ay isang uri ng mensaheng ipinapadala at tinatanggap sa pamamagitan ng elektronikong pamamaraan. Bawat email ay ipinapadala gamit ang isang email address.

Mga Bahagi ng Email Address: (1) Username, (2) At Symbol (@) na naghihiwalay sa username at domain, at (3) Domain (hal. gmail.com, yahoo.com, hotmail.com).

Ayon sa COPPA, kailangan ng pahintulot ng magulang bago gumawa ng email ang mga batang wala pang 13 taong gulang.

Mga Bahagi ng Email: Recipient, Cc at Bcc, Subject Line, Salutation, Email Body, Closing, Signature, Formatting Tool, More Options, at Delete Icon. Sa pag-attach ng file, karaniwang 10MB hanggang 25MB lamang ang limitasyon sa sukat.`

<!-- =================== APP =================== -->
<script>
const app = document.getElementById('app');
const STORE = 'fil5_reviewer_progress';
let progress = load();

function load(){ try{return JSON.parse(localStorage.getItem(STORE))||{};}catch(e){return {};} }
function save(){ try{localStorage.setItem(STORE,JSON.stringify(progress));}catch(e){} }
function keyFor(a){return a.id;}
function setBest(a,pct){
  const k=keyFor(a); const cur=progress[k]||{};
  progress[k]={done:true, best:Math.max(cur.best||0,pct)};
  save();
}
function markDone(a){ const k=keyFor(a); progress[k]=Object.assign({done:true},progress[k]||{}); save(); }
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor((i+1)* (hashStep(i)) )%(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
// deterministic-ish shuffle avoiding Math.random dependency issues; fine for classroom use
let _seed=7;
function hashStep(){ _seed=(_seed*1103515245+12345)&0x7fffffff; return _seed/0x7fffffff; }

/* ---------- session drafts: remember answers until submit / complete ---------- */
const DRAFTS='reviewer_drafts';
let drafts=loadDrafts();
function loadDrafts(){ try{return JSON.parse(localStorage.getItem(DRAFTS))||{};}catch(e){return {};} }
function saveDrafts(){ try{localStorage.setItem(DRAFTS,JSON.stringify(drafts));}catch(e){} }
function getDraft(id){ return drafts[id]||null; }
function setDraft(id,o){ drafts[id]=o; saveDrafts(); }
function clearDraft(id){ if(drafts[id]){ delete drafts[id]; saveDrafts(); } }

/* ---------- lookups ---------- */
function findLesson(id){ for(const s of DATA.subjects){ const l=s.lessons.find(x=>x.id===id); if(l) return {l,s}; } return {}; }
function subjectPct(s){ let all=0,done=0; s.lessons.forEach(l=>l.activities.forEach(a=>{all++; if((progress[keyFor(a)]||{}).done)done++;})); return all?Math.round(done/all*100):0; }

/* ---------- lesson progress ---------- */
function lessonPct(l){
  const acts=l.activities; let done=0;
  acts.forEach(a=>{ if((progress[keyFor(a)]||{}).done) done++; });
  return Math.round(done/acts.length*100);
}
/* ---------- HOME: pick a subject ---------- */
function home(){
  const cards = DATA.subjects.map(s=>{
    const soon = s.comingSoon || !s.lessons.length;
    const pct = subjectPct(s);
    return `<button class="lesson-card" style="background:linear-gradient(135deg,${s.color},#0000002e);${soon?'opacity:.72':''}" ${soon?'':`onclick="subject('${s.id}')"`}>
      <span class="emoji">${s.emoji}</span>
      <div class="num">ASIGNATURA</div>
      <h3>${esc(s.name)}</h3>
      <div class="meta">${soon?'⏳ Malapit nang idagdag…':`${s.lessons.length} na aralin`}</div>
      ${soon?'':`<div class="prog"><i style="width:${pct}%"></i></div><div class="meta" style="margin-top:6px">${pct}% tapos</div>`}
    </button>`;
  }).join('');
  app.innerHTML = `
    <div class="card">
      <h2 class="title">Kumusta, mag-aaral! 👋</h2>
      <p class="sub">Pumili ng asignatura sa ibaba. Ang iyong progreso at mga nasagutan ay awtomatikong naiaalala sa device na ito.</p>
    </div>
    <div class="grid">${cards}</div>
    <div class="card note">Tandaan: Ang ilang tanong (sanaysay, repleksiyon, pagguhit) ay <b>sarili mong ususuriin</b> — isulat ang sagot sa papel, tapos ihambing sa modelong sagot.</div>
  `;
  window.scrollTo(0,0);
}

/* ---------- SUBJECT: list its lessons ---------- */
function subject(sid){
  const s=DATA.subjects.find(x=>x.id===sid);
  if(!s.lessons.length){
    app.innerHTML=`<div class="crumbs"><a onclick="home()">🏠 Home</a> <span>›</span> <span>${esc(s.name)}</span></div>
      <div class="card center"><div style="font-size:52px">${s.emoji}</div>
      <h2 class="title">${esc(s.name)}</h2>
      <p class="sub">${esc(s.tagline)}</p>
      <div class="note" style="text-align:left">⏳ Wala pang aralin dito. Idadagdag ito kapag naihanda na ang nilalaman.</div>
      <div class="mt"><button class="btn secondary" onclick="home()">‹ Bumalik</button></div></div>`;
    window.scrollTo(0,0); return;
  }
  const cards=s.lessons.map((l,i)=>{
    const pct=lessonPct(l);
    return `<button class="lesson-card" style="background:linear-gradient(135deg,${l.color},#0000002e)" onclick="lesson('${l.id}')">
      <span class="emoji">${l.emoji}</span>
      <div class="num">ARALIN ${i+1}</div>
      <h3>${esc(l.title)}</h3>
      <div class="meta">${esc(l.blurb)}</div>
      <div class="prog"><i style="width:${pct}%"></i></div>
      <div class="meta" style="margin-top:6px">${pct}% tapos</div>
    </button>`;
  }).join('');
  app.innerHTML=`
    <div class="crumbs"><a onclick="home()">🏠 Home</a> <span>›</span> <span>${esc(s.name)}</span></div>
    <div class="card">
      <span class="pill">${s.emoji} ${esc(s.name)}</span>
      <h2 class="title" style="margin-top:10px">Mga Aralin</h2>
      <p class="sub">${esc(s.tagline)}</p>
      <div class="pill">🌟 Progreso sa asignatura: ${subjectPct(s)}%</div>
    </div>
    <div class="grid">${cards}</div>`;
  window.scrollTo(0,0);
}

/* ---------- LESSON MENU ---------- */
function lesson(id){
  const {l,s}=findLesson(id);
  const idx=s.lessons.indexOf(l)+1;
  const items=l.activities.map(a=>{
    const done=(progress[keyFor(a)]||{}).done;
    const best=(progress[keyFor(a)]||{}).best;
    const inprog=!!getDraft(a.id);
    const tagTxt = a.tag==='auto'?'Iiskoran':a.tag==='self'?'Sariling suri':'Babasahin';
    const bestTxt = (a.tag==='auto'&&best!=null)?` · Pinakamataas: ${best}%`:'';
    return `<button class="act-item" onclick="openAct('${l.id}','${a.id}')">
      <div class="ic">${a.icon}</div>
      <div class="txt"><b>${esc(a.name)}</b><span>${esc(a.desc)}${bestTxt}${inprog?' · ⏳ may naiwang sagot':''}</span></div>
      <div class="tag ${a.tag}">${tagTxt}</div>
      ${done?'<div class="tick">✓</div>':''}
    </button>`;
  }).join('');
  app.innerHTML=`
    <div class="crumbs"><a onclick="home()">🏠</a> <span>›</span> <a onclick="subject('${s.id}')">${esc(s.short||s.name)}</a> <span>›</span> <span>Aralin ${idx}</span></div>
    <div class="card">
      <span class="pill">${l.emoji} Aralin ${idx}</span>
      <h2 class="title" style="margin-top:10px">${esc(l.title)}</h2>
      <p class="sub">${esc(l.blurb)}</p>
      ${items}
    </div>`;
  window.scrollTo(0,0);
}

/* ---------- open activity dispatcher ---------- */
let CTX={}; let LASTWRONG=null;
function openAct(lid,aid){
  const {l,s}=findLesson(lid);
  const a=l.activities.find(x=>x.id===aid);
  CTX={l,a,s,review:false}; LASTWRONG=null;
  _seed=7; // reset pseudo-shuffle each open for consistency
  ({passage:renderPassage, mcq:renderMCQ, matching:renderMatching,
    sequencing:renderSeq, fillblank:renderFill, truefalse:renderTF,
    shortcheck:renderShort})[a.type]();
  window.scrollTo(0,0);
}
function crumbs(){
  const s=CTX.s; const idx=s.lessons.indexOf(CTX.l)+1;
  return `<div class="crumbs"><a onclick="home()">🏠</a> <span>›</span> <a onclick="subject('${s.id}')">${esc(s.short||s.name)}</a> <span>›</span> <a onclick="lesson('${CTX.l.id}')">Aralin ${idx}</a> <span>›</span> <span>${esc(CTX.a.name)}</span></div>`;
}
function backBtn(){return `<button class="btn secondary" onclick="lesson('${CTX.l.id}')">‹ Bumalik sa aralin</button>`;}

/* ---------- PASSAGE ---------- */
function renderPassage(){
  const a=CTX.a; let bodyHtml='';
  if(a.recipe){
    bodyHtml=`<div class="passage">
      <h4>${esc(a.heading)}</h4><div class="by">${esc(a.by)}</div>
      <b>Mga Sangkap:</b>
      <ul class="ingredients">${a.ingredients.map(i=>`<li>${esc(i)}</li>`).join('')}</ul>
      <b>Paraan ng Pagluluto:</b>
      <ol style="line-height:1.7;margin-top:8px">${a.steps.map(s=>`<li>${esc(s)}</li>`).join('')}</ol>
    </div>`;
  } else {
    bodyHtml=`<div class="passage ${a.poem?'poem':''}">
      <h4>${esc(a.heading)}</h4><div class="by">${esc(a.by)}</div><div class="ptext">${esc(a.body)}</div></div>`;
  }
  app.innerHTML=`${crumbs()}
    <div class="card">
      ${bodyHtml}
      ${a.orig?`<a class="origlink" href="${a.orig}" target="_blank">🖼️ Tingnan ang orihinal na pahina</a>`:''}
      <div class="mt" style="display:flex;gap:10px;flex-wrap:wrap">
        ${backBtn()}
        <button class="btn" onclick="finishRead()">Tapos na akong magbasa ✓</button>
      </div>
    </div>`;
}
function finishRead(){ clearDraft(CTX.a.id); markDone(CTX.a); lesson(CTX.l.id); }

/* ---------- MCQ ---------- */
function renderMCQ(){
  const items=CTX.a.items; const dkey=CTX.a.id; const useDraft=!CTX.review;
  let i=0, score=0, answered=false; let wrong=[]; const answers=[]; let curPick=null;
  function saveD(){ if(useDraft) setDraft(dkey,{answers:answers.slice(), curPick}); }
  function draw(){
    answered=false; curPick=null;
    const it=items[i];
    app.innerHTML=`${crumbs()}
      <div class="card">
        <div class="qhead"><span class="qcount">Tanong ${i+1} / ${items.length}</span><span class="qcount">Puntos: ${score}</span></div>
        <div class="qbar"><i style="width:${(i)/items.length*100}%"></i></div>
        <div class="qtext"><span class="idx">${i+1}.</span> ${esc(it.q)}</div>
        <div id="opts">${it.o.map((o,k)=>`<button class="opt" onclick="window._pick(${k})"><span class="lead">${'ABCD'[k]}.</span>${esc(o)}</button>`).join('')}</div>
        <div id="fb"></div>
        <div class="navq"><span></span><button class="btn" id="nx" disabled onclick="window._next()">${i+1<items.length?'Susunod ›':'Tapusin'}</button></div>
      </div>`;
  }
  function reveal(k){
    const it=items[i]; const opts=document.querySelectorAll('#opts .opt');
    opts.forEach((el,idx)=>{el.style.pointerEvents='none';
      if(idx===it.a)el.classList.add('correct');
      if(idx===k&&k!==it.a)el.classList.add('wrong');});
    const ok=k===it.a;
    document.getElementById('fb').innerHTML=`<div class="fb ${ok?'ok':'no'}">${ok?'✅ Tama!':'❌ Mali.'} ${it.e?esc(it.e):''}${it.flag?' <em>(Maaaring talakayin ng guro.)</em>':''}</div>`;
    document.getElementById('nx').disabled=false;
    return ok;
  }
  window._pick=function(k){
    if(answered)return; answered=true; curPick=k;
    const ok=reveal(k); if(ok)score++; else wrong.push(items[i]);
    saveD();
  };
  window._next=function(){
    answers.push(curPick);
    if(i+1<items.length){ i++; draw(); saveD(); }
    else { if(useDraft) clearDraft(dkey); LASTWRONG=wrong.length?{type:'mcq',items:wrong}:null; finishQuiz(score,items.length); }
  };
  // restore any in-progress answers
  const d=useDraft?getDraft(dkey):null;
  if(d && d.answers){
    d.answers.forEach(k=>{ const it=items[i]; if(k===it.a)score++; else wrong.push(it); answers.push(k); i++; });
    draw();
    if(d.curPick!=null){ answered=true; curPick=d.curPick; const ok=reveal(d.curPick); if(ok)score++; else wrong.push(items[i]); }
  } else { draw(); }
}

/* ---------- MATCHING ---------- */
function renderMatching(){
  const a=CTX.a; const left=a.left; const dkey=CTX.a.id; const useDraft=!CTX.review;
  const order = shuffle(a.right.map((r,i)=>i)); // display order of right col (deterministic)
  const d=useDraft?getDraft(dkey):null;
  let selLeft=null; const pairs=(d&&d.pairs)?Object.assign({},d.pairs):{}; // leftIdx -> rightIdx
  function saveD(){ if(useDraft) setDraft(dkey,{pairs}); }
  function draw(){
    const leftHtml=left.map((t,i)=>{
      const done=pairs[i]!=null;
      const cls=done?'chip done':(selLeft===i?'chip sel':'chip');
      const badge=done?`<span class="badge">✓ ${'ABCDE'[order.indexOf(pairs[i])]}</span>`:(selLeft===i?'<span class="badge">…</span>':'');
      return `<button class="${cls}" onclick="window._L(${i})">${badge}${esc(t)}</button>`;
    }).join('');
    const usedRight=Object.values(pairs);
    const rightHtml=order.map((ri,pos)=>{
      const used=usedRight.includes(ri);
      const cls=used?'chip done':'chip';
      return `<button class="${cls}" ${used?'':`onclick="window._R(${ri})"`}><span class="badge" style="float:left;margin-right:8px">${'ABCDE'[pos]}</span>${esc(a.right[ri])}</button>`;
    }).join('');
    const all=Object.keys(pairs).length===left.length;
    app.innerHTML=`${crumbs()}
      <div class="card">
        <div class="qtext" style="font-size:16px">Pindutin ang isang pahayag sa <b>Hanay A</b>, tapos ang katugma nito sa <b>Hanay B</b>.</div>
        <div class="match-wrap">
          <div class="match-col"><h5>Hanay A</h5>${leftHtml}</div>
          <div class="match-col"><h5>Hanay B</h5>${rightHtml}</div>
        </div>
        <div class="navq mt">${backBtn()}<button class="btn" ${all?'':'disabled'} onclick="window._check()">Suriin</button></div>
      </div>`;
  }
  window._L=function(i){ if(pairs[i]!=null){delete pairs[i];selLeft=null;saveD();draw();return;} selLeft=i; draw(); };
  window._R=function(ri){ if(selLeft==null)return; pairs[selLeft]=ri; selLeft=null; saveD(); draw(); };
  window._check=function(){
    if(useDraft) clearDraft(dkey);
    let score=0; const wL=[], wA=[];
    left.forEach((t,i)=>{ if(pairs[i]===a.answer[i])score++; else { wL.push(t); wA.push(a.answer[i]); } });
    LASTWRONG = wL.length?{type:'matching', left:wL, answer:wA}:null;
    // show feedback inline
    const rows=left.map((t,i)=>{
      const ok=pairs[i]===a.answer[i];
      return `<div class="seq-item ${ok?'ok':'bad'}"><span class="pos">${ok?'✓':'✗'}</span>
        <div class="body">${esc(t)}<br><small style="color:var(--muted)">Sagot: <b>${esc(a.right[a.answer[i]])}</b></small></div></div>`;
    }).join('');
    app.innerHTML=`${crumbs()}<div class="card"><h3>Resulta ng pagtutugma</h3>${rows}
      <div class="navq mt">${backBtn()}<button class="btn" onclick="finishQuiz(${score},${left.length})">Ipakita ang iskor</button></div></div>`;
  };
  draw();
}

/* ---------- SEQUENCING ---------- */
function renderSeq(){
  const a=CTX.a; const correct=a.items.slice(); const dkey=CTX.a.id; const useDraft=!CTX.review;
  const d=useDraft?getDraft(dkey):null;
  let order;
  if(d && Array.isArray(d.order) && d.order.length===correct.length){ order=d.order.slice(); }
  else { order=shuffle(correct.map((_,i)=>i)); if(order.every((v,i)=>v===i)) order.reverse(); }
  function saveD(){ if(useDraft) setDraft(dkey,{order:order.slice()}); }
  function move(pos,dir){
    const np=pos+dir; if(np<0||np>=order.length)return;
    [order[pos],order[np]]=[order[np],order[pos]]; saveD(); draw();
  }
  window._mv=move;
  function draw(checked){
    const rows=order.map((ci,pos)=>{
      let cls='seq-item';
      if(checked)cls+= (ci===pos?' ok':' bad');
      return `<div class="${cls}"><span class="pos">${pos+1}</span>
        <div class="body">${esc(correct[ci])}</div>
        ${checked?'':`<div class="arrows"><button onclick="window._mv(${pos},-1)">▲</button><button onclick="window._mv(${pos},1)">▼</button></div>`}</div>`;
    }).join('');
    app.innerHTML=`${crumbs()}
      <div class="card">
        <div class="qtext" style="font-size:16px">Iayos ang mga pangyayari mula <b>una (1)</b> hanggang <b>huli</b>. Gamitin ang ▲▼.</div>
        ${rows}
        ${a.flag&&checked?'<div class="note">Ang ilang gitnang pangyayari ay maaaring bahagyang magkaiba ang pagkakasunod — tanungin ang iyong guro kung may pagdududa.</div>':''}
        <div class="navq mt">${backBtn()}
        ${checked?`<button class="btn" onclick="finishQuiz(${order.filter((ci,pos)=>ci===pos).length},${order.length})">Ipakita ang iskor</button>`
                 :`<button class="btn" onclick="window._chk()">Suriin</button>`}</div>
      </div>`;
  }
  window._chk=function(){ if(useDraft) clearDraft(dkey); draw(true); };
  draw(false);
}

/* ---------- FILL IN THE BLANK ---------- */
function renderFill(){
  const a=CTX.a; const opts=a.wordbox; const dkey=CTX.a.id; const useDraft=!CTX.review;
  window._fv=function(){ if(useDraft) setDraft(dkey,{values:a.items.map((_,i)=>{const el=document.getElementById('s'+i);return el?el.value:'';})}); };
  function draw(){
    const box=`<div class="wordbox">${opts.map(w=>`<span>${esc(w)}</span>`).join('')}</div>`;
    const rows=a.items.map((it,i)=>{
      return `<div class="fbq">${i+1}. ${esc(it.before)}
        <select id="s${i}" onchange="window._fv()">
          <option value="">— pumili —</option>
          ${opts.map(w=>`<option value="${esc(w)}">${esc(w)}</option>`).join('')}
        </select>${esc(it.after)}</div>`;
    }).join('');
    app.innerHTML=`${crumbs()}
      <div class="card">
        <div class="qtext" style="font-size:16px">Piliin ang angkop na salita mula sa kahon.</div>
        ${box}${rows}
        <div class="navq mt">${backBtn()}<button class="btn" onclick="window._chk()">Suriin</button></div>
      </div>`;
    const d=useDraft?getDraft(dkey):null;
    if(d&&d.values){ a.items.forEach((_,i)=>{ const el=document.getElementById('s'+i); if(el&&d.values[i]) el.value=d.values[i]; }); }
  }
  window._chk=function(){
    if(useDraft) clearDraft(dkey);
    let score=0; const w=[];
    a.items.forEach((it,i)=>{
      const sel=document.getElementById('s'+i); const val=sel.value;
      const ok = Array.isArray(it.a) ? it.a.includes(val) : val===it.a;
      if(ok){score++;sel.className='ok';}else{sel.className='no';w.push(it);}
      sel.disabled=true;
      // append correct answer note
      const note=document.createElement('small');
      note.style.color='var(--muted)'; note.style.marginLeft='6px';
      note.innerHTML= ok?' ✓':` ✗ (${esc(Array.isArray(it.a)?it.a.join(' / '):it.a)})`;
      sel.parentNode.appendChild(note);
    });
    LASTWRONG = w.length?{type:'fillblank', items:w}:null;
    const bar=document.querySelector('.navq');
    bar.innerHTML=`${backBtn()}<button class="btn" onclick="finishQuiz(${score},${a.items.length})">Ipakita ang iskor</button>`;
  };
  draw();
}

/* ---------- TRUE / FALSE (B / HB) ---------- */
function renderTF(){
  const a=CTX.a; const dkey=CTX.a.id; const useDraft=!CTX.review;
  const d=useDraft?getDraft(dkey):null;
  const picks=(d&&d.picks)?Object.assign({},d.picks):{};
  const tLabel=a.tLabel||'B — Binanggit', fLabel=a.fLabel||'HB — Hindi';
  const prompt=a.prompt||'Piliin ang <b>B</b> kung binanggit sa reseta, <b>HB</b> kung hindi.';
  function saveD(){ if(useDraft) setDraft(dkey,{picks}); }
  function draw(){
    const rows=a.items.map((it,i)=>{
      return `<div class="tf-row" id="tf${i}">
        <div class="st">${i+1}. ${esc(it.st)}</div>
        <div class="opts">
          <button id="b${i}t" class="${picks[i]===true?'pick':''}" onclick="window._p(${i},true)">${tLabel}</button>
          <button id="b${i}f" class="${picks[i]===false?'pick':''}" onclick="window._p(${i},false)">${fLabel}</button>
        </div></div>`;
    }).join('');
    const all=Object.keys(picks).length===a.items.length;
    app.innerHTML=`${crumbs()}
      <div class="card">
        <div class="qtext" style="font-size:16px">${prompt}</div>
        ${rows}
        <div class="navq mt">${backBtn()}<button class="btn" ${all?'':'disabled'} onclick="window._chk()">Suriin</button></div>
      </div>`;
  }
  window._p=function(i,v){picks[i]=v;saveD();draw();};
  window._chk=function(){
    if(useDraft) clearDraft(dkey);
    let score=0; const w=[];
    a.items.forEach((it,i)=>{
      const row=document.getElementById('tf'+i);
      const ok=picks[i]===it.a; if(ok)score++; else w.push(it);
      row.classList.add(ok?'ok':'bad');
      const s=document.createElement('div'); s.style.marginTop='6px'; s.style.fontWeight='700';
      s.style.color=ok?'var(--good)':'var(--bad)';
      s.innerHTML= ok?'✓ Tama':`✗ Tamang sagot: ${it.a?(a.tWord||'B (Binanggit)'):(a.fWord||'HB (Hindi binanggit)')}`;
      row.appendChild(s);
    });
    LASTWRONG = w.length?{type:'truefalse', items:w}:null;
    document.querySelector('.navq').innerHTML=`${backBtn()}<button class="btn" onclick="finishQuiz(${score},${a.items.length})">Ipakita ang iskor</button>`;
  };
  draw();
}

/* ---------- SHORTCHECK (self-check) ---------- */
function renderShort(){
  const a=CTX.a; const dkey=CTX.a.id;
  const rows=a.items.map((it,i)=>`
    <div>
      <div class="sc-q"><span class="n">${i+1}.</span> ${esc(it.q)}</div>
      <textarea id="ta${i}" oninput="window._sc()" placeholder="Isulat dito ang iyong sagot…"></textarea>
      <div style="margin:8px 0 4px"><button class="btn small secondary" onclick="window._rev(${i})">👁️ Ipakita ang modelong sagot</button></div>
      <div class="model hide" id="m${i}"><b>Modelong sagot:</b> ${esc(it.m)}</div>
    </div>`).join('');
  app.innerHTML=`${crumbs()}
    <div class="card">
      <div class="qtext" style="font-size:16px">Ito ay <b>sariling pagsusuri</b>. Isulat muna ang iyong sagot, saka ihambing sa modelong sagot. Naiaalala ang iyong sinulat hanggang pindutin ang “Tapos na”.</div>
      ${rows}
      <div class="navq mt">${backBtn()}<button class="btn" onclick="finishRead();">Tapos na ✓</button></div>
    </div>`;
  window._rev=function(i){ document.getElementById('m'+i).classList.remove('hide'); };
  window._sc=function(){ setDraft(dkey,{texts:a.items.map((_,i)=>{const el=document.getElementById('ta'+i);return el?el.value:'';})}); };
  const d=getDraft(dkey);
  if(d&&d.texts){ a.items.forEach((_,i)=>{ const el=document.getElementById('ta'+i); if(el&&d.texts[i]!=null) el.value=d.texts[i]; }); }
}

/* ---------- RESULTS ---------- */
function finishQuiz(score,total){
  const pct=Math.round(score/total*100);
  if(!CTX.review){ setBest(CTX.a,pct); clearDraft(CTX.a.id); }
  const stars = pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':pct>=50?'⭐':'✨';
  const msg = pct>=90?'Napakahusay! Bihasa ka na!':pct>=70?'Magaling! Kaunti na lang!':pct>=50?'Mabuti! Ulitin pa natin.':'Kaya mo ’yan — subukan muli!';
  const emoji = pct>=90?'🏆':pct>=70?'🎉':pct>=50?'👍':'💪';
  const w=LASTWRONG; const wc = w?(w.items?w.items.length:(w.left?w.left.length:0)):0;
  const reviewBtn = wc>0 ? `<button class="btn" style="background:var(--accent2);box-shadow:0 4px 0 #a21c6b;color:#fff" onclick="reviewWrong()">🎯 Balikan ang mali (${wc})</button>` : '';
  app.innerHTML=`${crumbs()}
    <div class="card result">
      ${CTX.review?'<span class="pill" style="margin-bottom:10px">🎯 Balik-aral sa mga naunang mali</span>':''}
      <div class="big">${emoji}</div>
      <div class="stars">${stars}</div>
      <div class="score">${score}<small>/${total}</small></div>
      <div class="score" style="font-size:22px;color:var(--accent2);margin-top:-6px">${pct}%</div>
      <div class="msg">${msg}${(wc===0&&CTX.review)?' Lahat ay naitama na! 🌟':''}</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        ${reviewBtn}
        <button class="btn secondary" onclick="openAct('${CTX.l.id}','${CTX.a.id}')">🔁 Ulitin lahat</button>
        <button class="btn" onclick="lesson('${CTX.l.id}')">Bumalik sa aralin ›</button>
      </div>
    </div>`;
  window.scrollTo(0,0);
}

/* review only the items answered wrong; keeps drilling until none left */
function reviewWrong(){
  const w=LASTWRONG; if(!w) return;
  const clone = w.type==='matching'
    ? Object.assign({},CTX.a,{left:w.left,answer:w.answer})
    : Object.assign({},CTX.a,{items:w.items});
  CTX.a=clone; CTX.review=true; LASTWRONG=null; _seed=7;
  ({mcq:renderMCQ,matching:renderMatching,fillblank:renderFill,truefalse:renderTF})[w.type]();
  window.scrollTo(0,0);
}

home();
</script>
